[package]
name = "astrid-capsule-telegram"
version = "0.1.0"
description = "Telegram Bot frontend for Astrid OS — bridges the Telegram Bot API to the kernel IPC bus."
authors = ["Unicity Labs <info@unicity-labs.com>"]
astrid-version = ">=0.10.0"

[[component]]
id = "telegram"
file = "astrid_capsule_telegram.wasm"
type = "executable"
capabilities = { net = ["*"] }

[capabilities]
uplink = true
net = ["*"]

# IPC ACLs live in the `[publish]` / `[subscribe]` tables. The kernel reads its
# publish/subscribe allowlists from these keys only (see
# `Manifest::effective_ipc_publish_patterns`); the pre-0.10 `[capabilities]
# ipc_publish = [...]` arrays are not manifest fields at all and are silently
# ignored, which fails closed — every publish and subscribe is denied.
# `wit = "opaque"` declares an unvalidated JSON payload, as the CLI uplink does.
[publish]
"user.v1.prompt" = { wit = "opaque" }
"astrid.v1.approval.response.*" = { wit = "opaque" }
"astrid.v1.elicit.response.*" = { wit = "opaque" }

[subscribe]
"agent.v1.response" = { wit = "opaque" }
"agent.v1.stream.delta" = { wit = "opaque" }
"astrid.v1.approval" = { wit = "opaque" }
"astrid.v1.elicit.*" = { wit = "opaque" }
"astrid.v1.response.*" = { wit = "opaque" }

[env]
bot_token = { type = "secret", request = "Enter your Telegram Bot Token (from @BotFather)", placeholder = "123456:ABC-DEF..." }
allowed_user_ids = { type = "string", request = "Comma-separated Telegram user IDs allowed to use the bot (leave empty for unrestricted)", default = "" }
